# Docker пересоздаёт контейнер backend → новый IP. Статический proxy_pass
# резолвит hostname только при старте nginx → 502 до перезапуска frontend.
# 127.0.0.11 — встроенный DNS Docker; переменная в proxy_pass включает периодический резолв.
#
# Лимиты по IP (эффективны при прямом доступе к этому nginx). Распределённый DDoS — WAF/Cloudflare/провайдер.
limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_login:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;
limit_req_status 429;

server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;
    limit_conn perip 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html =404;
    }

    # Логин: жёстче, против перебора паролей
    location /api/v1/login/ {
        limit_req zone=api_login burst=5 nodelay;
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/v1/events/ {
        limit_req zone=api_general burst=200 nodelay;
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8000/api/v1/events/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    location /api {
        limit_req zone=api_general burst=100 nodelay;
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Закрываем документацию на edge (в non-local backend тоже отключает OpenAPI).
    location ^~ /docs {
        return 404;
    }

    location ^~ /redoc {
        return 404;
    }

    location = /openapi.json {
        return 404;
    }

    location = /api/v1/openapi.json {
        return 404;
    }
}
