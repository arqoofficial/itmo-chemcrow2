# Docker пересоздаёт контейнер backend → новый IP. Статический proxy_pass
# резолвит hostname только при старте nginx → 502 до перезапуска frontend.
# 127.0.0.11 — встроенный DNS Docker; переменная в proxy_pass включает периодический резолв.
server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html =404;
    }

    location /api/v1/events/ {
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    location /api {
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /docs {
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc {
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8000/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
