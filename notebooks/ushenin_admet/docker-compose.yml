services:
  admet-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admet-api
    ports:
      - "8144:8144"
    environment:
      ADMET_APP_NAME: "ADMET Microservice"
      ADMET_MAX_HEAVY_ATOMS: "200"
      ADMET_ALLOW_EXPLICIT_H: "false"
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8144/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
